<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <!-- 添加Google Noto字體，支援中文顯示 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  
    
  <title>般若波羅密多心經 (TXT版)</title>

  <style>
    body {
      font-family: "標楷體", "Microsoft JhengHei", serif;
      background-color: #e0b32b;
      color: #333;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: #8b4513;
      text-align: center;
      border-bottom: 1px solid #8b4513;
      padding-bottom: 10px;
      width: 100%;
      max-width: 800px;
    }
    h2 {
      font-family: "標楷體", "Microsoft JhengHei", serif;
      font-size: 16px;
      color: #8b4513;
      text-align: center;
      margin-top: -15px;
      margin-bottom: 5px;
      border-bottom: 1px solid #8b4513;
      padding-bottom: 2px;
      width: 100%;
      max-width: 800px;
      line-height: 1.2;
    }  
    
    .writing-container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      margin-top: 5px;
      height: 550px;
      border: 1px solid #d1c7b7;
      background-color: #ece3c6;
      padding: 20px;
      box-sizing: border-box;
      writing-mode: vertical-rl;
      text-orientation: upright;
      line-height: 1.5;
      overflow: auto;
    }
    .watermark-text {
      position: absolute;
      top: 20px;
      right: 20px;
      bottom: 20px;
      left: 10px;
      pointer-events: none;
      z-index: 1;
      color: rgba(113, 73, 5, 0.7);
      font-size: 24px;
      line-height:1.5;
      letter-spacing: 5px;
      white-space: pre-line;
      writing-mode: vertical-rl;
      text-orientation: upright;
    }
    .writing-area {
      position: absolute;
      top: 20px;
      right: 20px;
      bottom: 20px;
      left: 10px;
      font-size: 24px;
      background-color: transparent;
      outline: none;
      z-index: 2;
      color:transparent;
      caret-color: black;
      writing-mode: vertical-rl;
      text-orientation: upright;
      line-height: 1.5;
      letter-spacing: 5px;
      white-space: pre-line;
      ime-mode: active;
    }
    .writing-area span {
      color: black;
    }
    .writing-area .correct {
      color: rgb(15, 16, 15);
    }
    .writing-area .incorrect {
      color: red;
      text-decoration: underline;
    }
    .controls {
      margin: 20px 0;
      text-align: center;
      width: 100%;
      max-width: 800px;
    }
    button {
      font-family: "標楷體", "Microsoft JhengHei", serif;
      background-color: #8b4513;
      color: white;
      border: none;
      padding: 5px 10px;
      margin: 0 px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 18px;
    }
    button:hover {
      background-color: #a0522d;
    }
    .progress-container {
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
      width: 100%;
      max-width: 800px;
    }
    .completion-count {
      font-size: 18px;
      color: #8b4513;
      margin-left: 20px;
    }
    .reset-count-btn {
      background-color: #d9534f;
    }
    .reset-count-btn:hover {
      background-color: #c9302c;
    }
    .clear-btn {
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <h1>般若波羅密多心經 (文字檔載入版)</h1>
  <a href="index.html" style="display: inline-block; margin-bottom: 30px; padding: 6px 15px; background-color: #8b4513; color: white; text-decoration: none; border-radius: 4px; font-size: 16px; font-family: '標楷體', 'Microsoft JhengHei', 'Noto Serif TC', 'DFKai-SB', serif;">返回首頁</a>
  <h2>唐 三藏法師玄奘譯</h2>

  <div class="controls">
    <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
      <button id="saveBtn">保存進度</button>
      <button id="loadBtn">載入進度</button>
      <button id="clearBtn" class="clear-btn">清空進度</button>
      <div class="completion-count" id="completionCount">已完成遍數: 0</div>
      <button id="resetCountBtn" class="reset-count-btn">重置遍數</button>
    </div>
    <div id="autosave-status"></div>
  </div>

  <div class="writing-container">
    <div class="watermark-text" id="watermarkText">讀取經文中...</div>
    <div class="writing-area" id="userInput" contenteditable="false" spellcheck="false"></div>
  </div>

  <div class="progress-container">
    <div id="progress">進度: 0%</div>
  </div>

  <script>
    let sutraText = ''; // Will be loaded from TXT file
    const textFilePath = 'txt/The_Heart_Of_Prajna_Paramita_Sutra.txt';

    let isComposing = false;
    const watermarkText = document.getElementById('watermarkText');
    const userInput = document.getElementById('userInput');
    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const progress = document.getElementById('progress');
    const autosaveStatus = document.getElementById('autosave-status');
    const completionCount = document.getElementById('completionCount');
    const resetCountBtn = document.getElementById('resetCountBtn');

    function renderWatermark(text) {
      watermarkText.innerHTML = '';
      for (let char of text) {
        if (char === '\n') {
          watermarkText.innerHTML += '<br>';
        } else {
          const span = document.createElement('span');
          span.textContent = char;
          watermarkText.appendChild(span);
        }
      }
    }

    function updateProgress() {
      if (!sutraText) return; // Don't update if sutraText is not loaded
      const entered = userInput.innerText.replace(/\n/g, '');
      const sutraWithoutNewlines = sutraText.replace(/\n/g, '');
      if (sutraWithoutNewlines.length === 0) {
        progress.textContent = '進度: 0%';
        return;
      }
      const percent = Math.min(100, Math.round((entered.length / sutraWithoutNewlines.length) * 100));
      progress.textContent = `進度: ${percent}%`;
      
      if (percent === 100) {
        checkAndUpdateCompletionCount();
      }
    }

    function checkAndUpdateCompletionCount() {
      if (!sutraText) return;
      const data = localStorage.getItem('heartSutraProgress_txt'); // Use a different key for TXT version
      if (data) {
        const parsed = JSON.parse(data);
        const entered = parsed.text.replace(/\n/g, '');
        const sutraWithoutNewlines = sutraText.replace(/\n/g, '');
        
        if (sutraWithoutNewlines.length > 0 && entered.length === sutraWithoutNewlines.length) {
          let count = localStorage.getItem('heartSutraCompletionCount_txt') || 0;
          count = parseInt(count) + 1;
          localStorage.setItem('heartSutraCompletionCount_txt', count);
          
          localStorage.removeItem('heartSutraProgress_txt');
          userInput.innerHTML = '';
          
          updateCompletionCountDisplay();
          alert(`恭喜完成第 ${count} 遍抄經！已重置以便重新開始。`);
          
          loadProgress();
        }
      }
    }

    function updateCompletionCountDisplay() {
      const count = localStorage.getItem('heartSutraCompletionCount_txt') || 0;
      completionCount.textContent = `已完成遍數: ${count}`;
    }

    function updateUserDisplay() {
      if (isComposing || !sutraText) return;
      
      const typed = userInput.innerText;
      userInput.innerHTML = '';
      
      let sutraIndex = 0;
      for (let i = 0; i < typed.length; i++) {
        if (typed[i] === '\n') {
          userInput.innerHTML += '<br>';
          continue;
        }
        
        const span = document.createElement('span');
        span.textContent = typed[i];
        
        while (sutraIndex < sutraText.length && sutraText[sutraIndex] === '\n') {
          sutraIndex++;
        }
        
        if (sutraIndex < sutraText.length && typed[i] === sutraText[sutraIndex]) {
          span.className = 'correct';
        } else {
          span.className = 'incorrect';
        }
        
        userInput.appendChild(span);
        sutraIndex++;
      }
      
      updateProgress();
      placeCaretAtEnd(userInput);
    }

    function placeCaretAtEnd(el) {
      el.focus();
      const range = document.createRange();
      const sel = window.getSelection();
      range.selectNodeContents(el);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function saveProgress() {
      if (!sutraText) return;
      const cleanText = userInput.innerText;
      const data = {
        text: cleanText,
        timestamp: new Date().toISOString()
      };
      localStorage.setItem('heartSutraProgress_txt', JSON.stringify(data));
      autosaveStatus.textContent = `自動儲存於 ${new Date().toLocaleTimeString()}`;
    }

    function loadProgress() {
      if (!sutraText) return;
      const data = localStorage.getItem('heartSutraProgress_txt');
      if (data) {
        const parsed = JSON.parse(data);
        userInput.innerText = parsed.text;
      } else {
        userInput.innerHTML = '';
      }
      updateUserDisplay(); // Ensure display is updated after loading
    }

    function clearProgress() {
      if (confirm('確定要清空當前抄經進度嗎？此操作無法復原！')) {
        localStorage.removeItem('heartSutraProgress_txt');
        userInput.innerHTML = '';
        updateUserDisplay();
        alert('抄經進度已清空');
      }
    }

    async function initializeApp() {
      try {
        const response = await fetch(textFilePath);
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}, path: ${textFilePath}`);
        }
        sutraText = await response.text();
        sutraText = sutraText.replace(/\r\n/g, '\n'); // Normalize newlines if any

        if (sutraText.trim() === '') {
            watermarkText.textContent = '錯誤：經文檔案為空或僅包含空白字元。';
            progress.textContent = '進度: 錯誤';
            userInput.contentEditable = 'false';
            return;
        }

        renderWatermark(sutraText);
        userInput.contentEditable = 'true';
        loadProgress(); // This will also call updateUserDisplay
        updateCompletionCountDisplay();
        placeCaretAtEnd(userInput);

      } catch (error) {
        console.error("無法載入或初始化經文:", error);
        watermarkText.textContent = "錯誤：無法載入經文內容。請檢查檔案路徑或網路連線。";
        progress.textContent = "進度: 錯誤";
        userInput.contentEditable = "false";
      }
    }

    // Event Listeners
    userInput.addEventListener('compositionstart', () => { isComposing = true; });
    userInput.addEventListener('compositionend', () => {
      isComposing = false;
      updateUserDisplay();
    });
    userInput.addEventListener('input', () => {
      if (!isComposing) {
        updateUserDisplay();
      }
    });

    saveBtn.addEventListener('click', () => {
      saveProgress();
      alert('進度已保存');
    });
    loadBtn.addEventListener('click', () => {
      loadProgress();
      // updateUserDisplay is called within loadProgress
      alert('進度已載入');
    });
    clearBtn.addEventListener('click', clearProgress);
    
    resetCountBtn.addEventListener('click', () => {
      const count = localStorage.getItem('heartSutraCompletionCount_txt') || 0;
      if (parseInt(count) === 0) {
        alert('目前遍數已為 0，無需重置。');
        return;
      }
      if (confirm(`目前已完成 ${count} 遍抄經，是否確定要重置為 0？此操作無法復原。`)) {
        localStorage.removeItem('heartSutraCompletionCount_txt');
        updateCompletionCountDisplay();
        alert('遍數已重置為 0。');
      }
    });

    // Autosave
    setInterval(() => {
      if (userInput.contentEditable === 'true') { // Only save if editable
         saveProgress();
      }
    }, 5000);

    // Initialize
    initializeApp();
  </script>
</body>
</html>
